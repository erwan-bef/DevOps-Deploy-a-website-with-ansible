---
- name: configuration serveur web apache
  hosts: server2

  tasks:
    - name: ping la machine
      ping:

    - name: mettre à jour les paquets
      apt:
        update_cache: yes
        cache_valid_time: 3600
      become: true
      become_user: root

    - name: Installer apache2
      apt:
        name: apache2
      become: true
      become_user: root

    - name: lancer apache2 au démarrage
      service:
        name: apache2
        state: started
        enabled: true
      become: true
      become_user: root